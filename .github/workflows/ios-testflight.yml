name: iOS — TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/ios-testflight.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      TEAM_ID: 7L567TM2CH
      BUNDLE_ID: com.mancavegaming.TeachToReach
      KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Bump build number to GH run number
        run: |
          # Compose a build number that bumps every CI run, while keeping the
          # human-readable version from pubspec.yaml. e.g. "0.1.0+42".
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/version: ([^+]+).*/\1/' | tr -d ' ')
          NEW_VERSION="${VERSION}+${GITHUB_RUN_NUMBER}"
          sed -i.bak "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Building $NEW_VERSION"
          rm pubspec.yaml.bak

      - name: Pub get
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Stage App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          mkdir -p ~/.private_keys
          # Both locations — xcodebuild reads ~/.private_keys, altool reads
          # ~/.appstoreconnect/private_keys.
          echo "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${KEY_ID}.p8
          cp ~/.private_keys/AuthKey_${KEY_ID}.p8 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Build iOS (no codesign)
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=CLAUDE_API_KEY="$CLAUDE_API_KEY"

      - name: Archive
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID $KEY_ID \
            -authenticationKeyIssuerID $ISSUER_ID \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID $KEY_ID \
            -authenticationKeyIssuerID $ISSUER_ID
          ls -lh build/ipa

      - name: Upload to TestFlight
        run: |
          IPA=$(find build/ipa -name "*.ipa" | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey $KEY_ID \
            --apiIssuer $ISSUER_ID

      - name: Upload IPA artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ipa/
          retention-days: 7
